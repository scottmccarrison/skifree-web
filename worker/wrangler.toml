name = "skifree-api"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Tightened from /ski* to /ski + /ski/* so the wildcard does not capture
# /skidev* (which is bound to a separate worker via wrangler.dev.toml).
routes = [
  { pattern = "mccarrison.me/ski", zone_name = "mccarrison.me" },
  { pattern = "mccarrison.me/ski/*", zone_name = "mccarrison.me" },
]

[vars]
PATH_PREFIX = "/ski"

# Static asset binding: serves the parent skifree-web directory at the
# worker root, while the worker code itself handles /api/*.
[assets]
directory = "../"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database for the leaderboard.
[[d1_databases]]
binding = "DB"
database_name = "skifree"
database_id = "cfefb367-2dcd-4512-9bd6-f38c2db16424"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["OpenHill"]

[[migrations]]
tag = "v3"
deleted_classes = ["OpenHill"]
