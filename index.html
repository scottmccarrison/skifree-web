<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#e8f4ff" />
  <title>Ski Free</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <button id="title-button" type="button" title="end run and view leaderboard">SKI FREE</button>

  <div id="top-right">
    <input id="name-input" type="text" maxlength="4" placeholder="initials" autocomplete="off" />
    <button id="wardrobe-btn" type="button" title="cosmetics &amp; achievements">W</button>
    <button id="help-btn" type="button" title="report a bug or suggestion">?</button>
  </div>

  <div id="feedback-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="fb-card">
      <div class="fb-title">what's new</div>
      <div id="changelog-body"></div>
      <div class="fb-divider"></div>
      <div class="fb-title">send feedback</div>
      <textarea id="fb-text" maxlength="4000" rows="5" placeholder="bug? idea? what happened?"></textarea>
      <div id="fb-status"></div>
      <div class="fb-actions">
        <button id="fb-cancel" type="button">cancel</button>
        <button id="fb-send" type="button">send</button>
      </div>
    </div>
  </div>

  <div id="mp-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="mp-title">
    <div class="fb-card mp-card">
      <div class="fb-title" id="mp-title">Multiplayer</div>

      <div id="mp-roster-wrap" class="hidden">
        <div class="mp-roster-header">
          <span id="mp-roster-count">0/10</span> players
        </div>
        <div id="mp-roster" class="mp-roster"></div>
      </div>

      <div id="mp-code-row" class="hidden">
        <div class="mp-code">CODE: <span id="mp-code-display"></span></div>
      </div>

      <div id="mp-status">&nbsp;</div>
      <button id="mp-ready" class="mp-btn hidden" disabled>I'm ready</button>

      <div id="mp-pre-join">
        <button id="mp-host" class="mp-btn">Host a run</button>
        <div class="mp-divider">- or -</div>
        <div class="mp-join-row">
          <input id="mp-code-input" maxlength="4" placeholder="CODE" autocapitalize="characters" autocomplete="off" />
          <button id="mp-join-go" class="mp-btn">Join</button>
        </div>
      </div>

      <button id="mp-cancel" class="mp-btn mp-btn-secondary">Cancel</button>
    </div>
  </div>

  <div id="cosmetic-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="fb-card cosmetic-card">
      <div class="fb-title">Wardrobe</div>
      <div class="cos-progress"><span id="cos-progress-text">0 / 30</span> unlocked</div>
      <div id="cos-grid"></div>
      <div class="fb-actions">
        <button id="cos-close" type="button">close</button>
      </div>
    </div>
  </div>

  <div id="touch-zones" aria-hidden="true">
    <div class="tzone" data-dir="left"></div>
    <div class="tzone" data-dir="right"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
