<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#e8f4ff" />
  <title>Ski Free</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <input id="name-input" type="text" maxlength="16" placeholder="your name" autocomplete="off" />

  <div id="corner-buttons">
    <button id="help-btn" type="button" title="report a bug or suggestion">?</button>
    <button id="end-btn" type="button" title="end run and view leaderboard">
      <canvas id="end-icon" width="36" height="36"></canvas>
    </button>
  </div>


  <div id="touch-zones" aria-hidden="true">
    <div class="tzone" data-dir="left"></div>
    <div class="tzone" data-dir="right"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
